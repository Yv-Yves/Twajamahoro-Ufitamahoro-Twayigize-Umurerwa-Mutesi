<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Entertainment Registration Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            background: #fff;
            padding: 20px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
        }
        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }
        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        .checkbox-group {
            margin-top: 5px;
        }
        .checkbox-group input {
            width: auto;
        }
        button {
            margin-top: 15px;
            padding: 10px;
            width: 100%;
            background: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🎤 Entertainment Registration Form</h2>

    <form>
        <label>Full Name</label>
        <input type="text" name="fullname" required>

        <label>Age</label>
        <input type="number" name="age" required>

        <label>Gender</label>
        <select name="gender">
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select>

        <label>Phone Number</label>
        <input type="tel" name="phone" required>

        <label>Email</label>
        <input type="email" name="email">

        <label>Type of Entertainment</label>
        <div class="checkbox-group">
            <input type="checkbox" name="type" value="Singing"> Singing
            <input type="checkbox" name="type" value="Dancing"> Dancing
            <input type="checkbox" name="type" value="Comedy"> Comedy
            <input type="checkbox" name="type" value="Drama"> Drama
        </div>

        <label>Performance Title</label>
        <input type="text" name="title">

        <label>Group or Solo</label>
        <select name="mode">
            <option>Solo</option>
            <option>Group</option>
        </select>

        <label>Duration (minutes)</label>
        <input type="number" name="duration">

        <label>Special Requirements</label>
        <textarea name="requirements" rows="3"></textarea>

        <button type="submit">Register</button>
    </form>
</div>

</body>
</html>
